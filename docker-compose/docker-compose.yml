version: '3.8'

services:
  # База даних
  db:
    image: postgres:16-alpine
    container_name: postgres-maditron
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Візуальний інтерфейс бази
  pgadmin:
    image: dpage/pgadmin4
    container_name: maditron_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db

  # Бекенд (API)
  api:
    build: 
      context: ../api 
    container_name: maditron-api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env 
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      - db
    volumes:
      - ../api:/usr/src/app
      - /usr/src/app/node_modules 
    command: npm run start:dev

volumes:
  postgres_data: